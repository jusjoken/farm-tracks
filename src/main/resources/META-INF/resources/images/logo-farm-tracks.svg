<!-- filepath: /home/birch/projects/farm-tracks/src/main/resources/static/logo-farm-tracks.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img" aria-labelledby="title desc">
  <title id="title">Farm Tracks logo</title>
  <desc id="desc">Farm Tracks text with animal paw prints on a green farm-style badge.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <style>
      .title { font: 700 72px 'Segoe UI', Arial, sans-serif; fill: #2e5033; }
      .sub { font: 500 28px 'Segoe UI', Arial, sans-serif; fill: #4f7d57; }
      .paw { fill: #6d4c41; }
      .ring { fill: none; stroke: #4f7d57; stroke-width: 6; }
    </style>
  </defs>

  <rect width="640" height="240" rx="20" fill="url(#bg)"/>

  <g transform="translate(28,20)">
    <circle cx="90" cy="100" r="70" class="ring"/>
    <g transform="translate(90,100)">
      <ellipse class="paw" cx="0" cy="14" rx="22" ry="18"/>
      <ellipse class="paw" cx="-20" cy="-12" rx="9" ry="12"/>
      <ellipse class="paw" cx="-5" cy="-24" rx="9" ry="12"/>
      <ellipse class="paw" cx="10" cy="-24" rx="9" ry="12"/>
      <ellipse class="paw" cx="25" cy="-12" rx="9" ry="12"/>
    </g>
    <g transform="translate(38,58) scale(.6)">
      <ellipse class="paw" cx="0" cy="14" rx="22" ry="18"/>
      <ellipse class="paw" cx="-20" cy="-12" rx="9" ry="12"/>
      <ellipse class="paw" cx="-5" cy="-24" rx="9" ry="12"/>
      <ellipse class="paw" cx="10" cy="-24" rx="9" ry="12"/>
      <ellipse class="paw" cx="25" cy="-12" rx="9" ry="12"/>
    </g>
  </g>

  <text x="194" y="138" class="title">Farm Tracks</text>
  <text x="198" y="176" class="sub">Track your stock with confidence</text>
</svg>