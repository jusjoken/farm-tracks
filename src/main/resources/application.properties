server.port=${PORT:8443}
server.ssl.enabled=${SERVER_SSL_ENABLED:true}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:file:/home/birch/appdata/farmtracks/local-certs/farmtracks.p12}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:tomcat}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
# Use cookie-only session tracking to prevent jsessionid in URLs (avoids redirect loops behind reverse proxy)
server.servlet.session.tracking-modes=cookie
# Keep sessions alive during short idle periods in debug/dev navigation workflows.
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:8h}
logging.level.org.atmosphere = warn
spring.mustache.check-template-location = false
#PROFILE_IMAGE_PATH=${PATH_TO_PROFILE_IMAGE}

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true
# Toggle production mode with env var for containerized/proxy deployments.
vaadin.productionMode=${VAADIN_PRODUCTION_MODE:false}
# Allow disabling PWA/service worker in deployments where aggressive client
# caching can cause stale frontend bundles.
vaadin.pwa.enabled=${VAADIN_PWA_ENABLED:true}
# Avoid server-side session shutdown due to missed heartbeats when browser tabs are throttled/backgrounded.
vaadin.closeIdleSessions=${VAADIN_CLOSE_IDLE_SESSIONS:false}
app.version.major=${APP_VERSION_MAJOR:1}

# MariaDB Configuration
spring.datasource.url=${DM_DB_URL}
spring.datasource.username=${DM_DB_USER}
spring.datasource.password=${DM_DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.max-lifetime=28800
spring.jpa.hibernate.ddl-auto = update
#uncomment both lines below to output the SQL used with JPA Hibernate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages = com.vaadin,org.vaadin,ca.jusjoken,com.flowingcode,com.vaadin.componentfactory
spring.jpa.defer-datasource-initialization = true
spring.sql.init.mode = always

# Optional bootstrap admin user for first startup when auth tables are empty.
# Set via environment variables for production deployments.
app.security.bootstrap-admin.username=${APP_SECURITY_BOOTSTRAP_ADMIN_USERNAME:}
app.security.bootstrap-admin.password=${APP_SECURITY_BOOTSTRAP_ADMIN_PASSWORD:}

# needed to allow image and camera uploads
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.max-file-size=30MB

# Reduce benign Vaadin context-menu RPC noise caused by stale client events during refreshes.
logging.level.com.vaadin.flow.server.communication.rpc.AbstractRpcInvocationHandler=warn
logging.level.com.vaadin.flow.internal.nodefeature.ElementListenerMap=warn
# Security event logging: WARN captures auth failures and session destruction; DEBUG adds successes.
logging.level.ca.jusjoken.security=warn
logging.level.org.springframework.security.web.authentication.rememberme=warn

# Vaadin push/heartbeat can produce delayed concurrent requests after session expiry.
# Keep this window comfortably above typical push reconnect/long-poll timing.
app.security.remember-me.concurrent-race-window-ms=${APP_SECURITY_REMEMBERME_CONCURRENT_RACE_WINDOW_MS:900000}
app.security.remember-me.suppress-login-fail-cookie-clear=${APP_SECURITY_REMEMBERME_SUPPRESS_LOGIN_FAIL_COOKIE_CLEAR:true}
