server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name _;

    include /config/nginx/ssl.conf;

    client_max_body_size 30M;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        # Tell Spring the real external port so redirects (e.g. to /login) include it
        proxy_set_header X-Forwarded-Port 44302;

        # Rewrite any absolute redirects from the app to use the external port and client's host
        proxy_redirect https://localhost/ https://$host:44302/;
        proxy_redirect http://localhost/ https://$host:44302/;

        set $upstream_app farmtracks;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
